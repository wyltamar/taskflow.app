<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="index.css">
    <title>TaskFlow App</title>
</head>

<body>

    <div class="sub-header">TaskFlow - TODO em Tempo Real</div>

    <div class="flex-container">

        <div class="header">
            <h1>Task<span>Flow</span></h1>
            <img src="./img/perfil.png" alt="foto-do-perfil-usuario" id="perfil">
            <button>
            <img src="./img/sair.png" alt="botão-sair" id="img-sair">

        </div>

        <div class="add-task">
            <input type="text" placeholder="O que precisa ser feito hoje?">

        <div class="text-center">
            <img src="./img/check.png" alt="ícone check" style="width:32px;height:32px;">
            <p>Nenhuma tarefa pendente. Aproveite seu dia!</p>
        </div>

    </div>

    <footer>
        <span>REAL-TIME ENGINE v 1.0</span>
        <span>© 2026 TASKFLOW</span>
    </footer>
